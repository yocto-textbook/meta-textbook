# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend \
            ${LAYERDIR}/appends/*/*.bbappend \
            "

BBFILE_COLLECTIONS += "meta-thirdparty"
BBFILE_PATTERN_meta-thirdparty = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-thirdparty = "6"

LAYERDEPENDS_meta-thirdparty = "core"
LAYERSERIES_COMPAT_meta-thirdparty = "scarthgap"
