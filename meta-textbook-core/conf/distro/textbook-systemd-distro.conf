# Load the base distro configuration. This file provides the common
# settings shared across all core-based distros. The current file
# overrides and extends those settings to create a systemd-enabled distro.
require conf/distro/textbook-core-distro.conf

# Basic distro identity and metadata.
DISTRO ?= "textbook-systemd-distro"
DISTRO_NAME ?= "Textbook Systemd Distro (Textbook Systemd Distro)"
DISTRO_VERSION ?= "1.0.0"
DISTRO_CODENAME = "scarthgap"

# SDK metadata used for naming and packaging the generated SDK.
SDK_VENDOR = "-systemdsdk"
SDK_VERSION = "${@d.getVar('DISTRO_VERSION').replace('snapshot-${METADATA_REVISION}', 'snapshot')}"

# ---------------------------------------------------------------------
# Systemd configuration overrides
# ---------------------------------------------------------------------
# Enable systemd and usrmerge support. The usrmerge feature is required
# by systemd in modern Yocto releases, as systemd expects a unified
# /usr filesystem layout.
DISTRO_FEATURES:append = " systemd usrmerge"

# Remove sysvinit support to avoid conflicts with systemd.
DISTRO_FEATURES:remove = " sysvinit"

# Select systemd as the init manager and disable sysvinit scripts.
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

# Prevent Yocto from automatically reintroducing sysvinit through
# backfill mechanisms.
DISTRO_FEATURES_BACKFILL_CONSIDERED = "sysvinit"

# Provide compatibility units for legacy init scripts when needed.
VIRTUAL-RUNTIME_initscript = "systemd-compat-units"
