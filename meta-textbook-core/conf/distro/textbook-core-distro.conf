# Basic distro identity and metadata.
DISTRO ?= "textbook-core-distro"
DISTRO_NAME ?= "Textbook Core Distro (Textbook Core Distro)"
DISTRO_VERSION ?= "1.0.0"
DISTRO_CODENAME ?= "scarthgap"

# SDK metadata used for naming and packaging the generated SDK.
SDK_VENDOR ?= "-textbooksdk"
SDK_VERSION ?= "${@d.getVar('DISTRO_VERSION').replace('snapshot-${METADATA_REVISION}', 'snapshot')}"
SDK_VERSION[vardepvalue] = "${SDK_VERSION}"

# Maintainer information for documentation and metadata.
MAINTAINER ?= "dylan.hong <dylanhong920509@gmail.com>"

# Vendor suffix appended to target triplets and package naming.
TARGET_VENDOR ?= "-textbook"

# Local configuration versioning (rarely used, but kept for compatibility).
LOCALCONF_VERSION ?= "2"

# Default settings intended to be overridden by core-based distros.
# These define baseline features and package dependencies for the distro.
CORE_DEFAULT_DISTRO_FEATURES = "multiarch"
CORE_DEFAULT_EXTRA_RDEPENDS = "packagegroup-textbook-core"
CORE_DEFAULT_EXTRA_RRECOMMENDS = "kernel-module-af-packet"

# Combine default distro features with core-specific defaults.
DISTRO_FEATURES ?= "${DISTRO_FEATURES_DEFAULT} ${CORE_DEFAULT_DISTRO_FEATURES}"

# Select preferred kernel versions (regular and real-time variants).
PREFERRED_VERSION_linux-yocto ?= "6.6%"
PREFERRED_VERSION_linux-yocto-rt ?= "6.6%"

# SDK naming and installation path configuration.
# These values determine how the SDK is packaged and where it is installed.
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDKMACHINE}-${IMAGE_BASENAME}-${TUNE_PKGARCH}-${MACHINE}"
SDKPATHINSTALL = "/opt/${DISTRO}/${SDK_VERSION}"

# Add core-level runtime dependencies and recommendations to the distro.
DISTRO_EXTRA_RDEPENDS += "${CORE_DEFAULT_EXTRA_RDEPENDS}"
DISTRO_EXTRA_RRECOMMENDS += "${CORE_DEFAULT_EXTRA_RRECOMMENDS}"

# Placeholder for additional C library configuration (currently unused).
TCLIBCAPPEND = ""

# Select the package format used by the distro (RPM by default).
PACKAGE_CLASSES ?= "package_rpm"

# List of host distributions that have been tested and validated for sanity checks.
# This helps detect unsupported or unstable build environments.
SANITY_TESTED_DISTROS ?= " \
            poky-4.3 \n \
            poky-5.0 \n \
            ubuntu-20.04 \n \
            ubuntu-22.04 \n \
            ubuntu-23.04 \n \
            ubuntu-24.04 \n \
            fedora-38 \n \
            fedora-39 \n \
            fedora-40 \n \
            fedora-41 \n \
            centos-8 \n \
            centos-9 \n \
            debian-11 \n \
            debian-12 \n \
            opensuseleap-15.4 \n \
            almalinux-8.8 \n \
            almalinux-8.9 \n \
            almalinux-8.10 \n \
            almalinux-9.2 \n \
            almalinux-9.4 \n \
            rocky-8 \n \
            rocky-9 \n \
            "

# Enable Poky’s extended sanity checks to validate the build environment.
INHERIT += "poky-sanity"

# Optional QA settings (currently aligned with OE-Core defaults).
#WARN_TO_ERROR_QA = "X"
#WARN_QA_remove = "${WARN_TO_ERROR_QA}"
#ERROR_QA_append = " ${WARN_TO_ERROR_QA}"

# Include common distro-level configuration fragments.
# - no-static-libs: removes static libraries to reduce image size.
# - yocto-uninative: ensures host-OS-independent native toolchain.
# - security_flags: enables hardened compiler/linker flags.
require conf/distro/include/no-static-libs.inc
require conf/distro/include/yocto-uninative.inc
require conf/distro/include/security_flags.inc

# Enable uninative support (host glibc independence).
INHERIT += "uninative"

# Configure signature and hash equivalence handling for reproducible builds.
BB_SIGNATURE_HANDLER ?= "OEEquivHash"
BB_HASHSERVE ??= "auto"

# Default init system for this distro (can be overridden by derived distros).
CORE_INIT_MANAGER = "sysvinit"
INIT_MANAGER ?= "${CORE_INIT_MANAGER}"

# Include kernel debug symbols to support SPDX license manifest generation.
KERNEL_EXTRA_FEATURES:append = " features/debug/debug-kernel.scc"

# Enable automatic generation of SPDX license manifests.
INHERIT += "create-spdx"
