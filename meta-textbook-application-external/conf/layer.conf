# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-textbook-application-external"
BBFILE_PATTERN_meta-textbook-application-external = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-textbook-application-external = "6"

LAYERDEPENDS_meta-textbook-application-external = "core"
LAYERSERIES_COMPAT_meta-textbook-application-external = "scarthgap"
