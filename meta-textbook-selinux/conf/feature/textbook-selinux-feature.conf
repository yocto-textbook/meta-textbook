# ------------------------------------------------------------
# SELinux Machine and Distro Feature Configuration
# ------------------------------------------------------------
# Enable SELinux-specific machine capabilities. Distro-level policy
# and user space components are governed by the core distro config.
MACHINE_FEATURES:append = " selinux"

# Enable mandatory user-space prerequisites for SELinux (ACL, XATTR, PAM).
DISTRO_FEATURES:append = " acl xattr pam selinux"

# Select the 'targeted' policy type instead of the default 'mls' (Multi-Level Security).
# This aligns the virtual/refpolicy provider with standard embedded deployments
# where only specific network daemons and system services are confined.
SELINUX_MODE = "targeted"
PREFERRED_PROVIDER_virtual/refpolicy = "refpolicy-targeted"

# Inherit the selinux-image class to automate file system labeling during rootfs assembly.
IMAGE_CLASSES += "selinux-image"

# ------------------------------------------------------------
# Logging and Syslog Configuration
# ------------------------------------------------------------
# Disable the default lightweight syslog implementation from busybox-base-utils.
# This prevents conflicts with advanced auditd or systemd-journald configurations
# required for a secure, audited SELinux environment.
VIRTUAL-RUNTIME_base-utils-syslog = ""
BAD_RECOMMENDATIONS += "busybox-syslog"

# ------------------------------------------------------------
# Image Installation and Runtime Policy State
# ------------------------------------------------------------
# Install core SELinux user-space utilities and dependencies.
# The packagegroup automatically pulls in the targeted policy binaries
# based on the PREFERRED_PROVIDER set above.
IMAGE_INSTALL:append = " packagegroup-core-selinux"

# Set the initial SELinux mode at boot time.
# 'permissive' is highly recommended during BSP bring-up and debugging phases
# to log denials without blocking system initialization or service startup.
SELINUX_DEFAULT_MODE = "permissive"
