# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend \
            ${LAYERDIR}/appends/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-textbook-rootfs"
BBFILE_PATTERN_meta-textbook-rootfs = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-textbook-rootfs = "6"

LAYERDEPENDS_meta-textbook-rootfs = "core meta-textbook-core"
LAYERSERIES_COMPAT_meta-textbook-rootfs = "scarthgap"
