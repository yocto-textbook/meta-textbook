# ORIGIN: poky/meta/conf/machine/qemuarm64.conf
# @TYPE: Machine
# @NAME: QEMU ARMv8 machine
# @DESCRIPTION: Machine configuration for running an ARMv8 system on QEMU

# Include tuning settings for ARMv8-A architecture (Cortex-A57)
require conf/machine/include/arm/armv8a/tune-cortexa57.inc

# Include common QEMU machine configuration
require conf/machine/include/textbook-qemu.inc

# ---------------------------------------------------------------------------
# Kernel image configuration
# ---------------------------------------------------------------------------
# KERNEL_IMAGETYPE:
#   - Specifies the output format of the built kernel image.
#   - For ARM64, "Image" is the standard uncompressed kernel image.
KERNEL_IMAGETYPE = "Image"

# ---------------------------------------------------------------------------
# U-Boot configuration
# ---------------------------------------------------------------------------
# UBOOT_MACHINE:
#   - Defines which U-Boot defconfig should be used during the build.
#   - qemu_arm64_defconfig is tailored for QEMU ARM64 environments.
UBOOT_MACHINE ?= "qemu_arm64_defconfig"

# ---------------------------------------------------------------------------
# Serial console configuration
# ---------------------------------------------------------------------------
# SERIAL_CONSOLES:
#   - Defines serial ports and baud rates for the QEMU environment.
#   - "ttyAMA0" is the ARM PL011 UART.
#   - "hvc0" is the QEMU hypervisor console.
SERIAL_CONSOLES ?= "115200;ttyAMA0 115200;hvc0"

# MACHINEOVERRIDES:
#   - Extends Yocto's override mechanism.
#   - Adding ":textbook" allows applying additional textbook-specific settings.
MACHINEOVERRIDES =. ":textbook"

# ---------------------------------------------------------------------------
# Kernel build settings
# ---------------------------------------------------------------------------

# KBUILD_DEFCONFIG:
#   - The default defconfig used when building the kernel.
#   - Refers to arch/arm64/configs/defconfig in the kernel source tree.
KBUILD_DEFCONFIG = "defconfig"

# Kernel version and custom extension
# LINUX_VERSION:
#   - Specifies the kernel version to use.
# LINUX_VERSION_EXTENSION:
#   - Appends a custom suffix to the kernel version (useful for custom builds).
LINUX_VERSION ?= "6.6"
LINUX_VERSION_EXTENSION ?= "-textbook"

# Select the default provider for virtual/kernel.
# This machine uses the linux-textbook recipe as its kernel.
PREFERRED_PROVIDER_virtual/kernel = "linux-textbook"
